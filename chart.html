<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Mô phỏng Thống kê Client v4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #22c55e;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }
        /* Sidebar */
        .sidebar {
            width: 420px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 20;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }
        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            background: #fff;
        }
        .sidebar-footer {
            height: 220px;
            border-top: 2px solid var(--border);
            background: #fdfdfd;
            display: flex;
            flex-direction: column;
        }
        /* Components */
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* Day Item Styles */
        .day-list { display: flex; flex-direction: column; gap: 8px; }
        .day-item {
            display: grid;
            grid-template-columns: 80px 1fr 60px;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .day-item:hover { border-color: #cbd5e1; background: #f1f5f9; }
        .day-item.is-low { opacity: 0.5; background: #fff; border-style: dashed; }
        .day-label { font-size: 13px; font-weight: 600; color: #334155; }
        .day-input-group input { margin-bottom: 0; padding: 6px; font-size: 12px; text-align: center; font-weight: bold; }

        /* Toggle Switch */
        .toggle-switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Buttons */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-primary { background: var(--primary); color: white; flex: 2; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text-main); flex: 1; }
        .btn-outline:hover { background: #f1f5f9; }

        /* Log List */
        .log-header { padding: 12px 20px; background: #f1f5f9; font-size: 11px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .log-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; display: flex; flex-direction: column; gap: 6px; }
        .log-item { padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
        .log-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .log-time { color: var(--primary); font-weight: bold; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Thiết lập Công cụ</h2>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Ngày bắt đầu</label>
                    <input type="date" id="startDate" value="2025-09-14">
                </div>
                <div style="flex: 1;">
                    <label>Ngày kết thúc</label>
                    <input type="date" id="endDate" value="2025-10-13">
                </div>
            </div>
            <label>Trần tối đa Trục Y</label>
            <input type="number" id="maxY" value="3500" step="100">
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="handleManualUpdate()">Cập nhật & Lưu Log</button>
                <button class="btn btn-outline" title="Lưu ảnh biểu đồ" onclick="exportImage()">📷 Lưu ảnh</button>
            </div>
        </div>

        <div class="sidebar-content">
            <label>Cấu hình chi tiết từng ngày</label>
            <div id="dayList" class="day-list"></div>
        </div>

        <div class="sidebar-footer">
            <div class="log-header">
                LỊCH SỬ CHỈNH SỬA
                <button onclick="clearLogs()" style="border:none; background:none; color:red; cursor:pointer; font-size:10px;">Xóa sạch</button>
            </div>
            <div id="logList" class="log-list"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
                <div>
                    <h2 id="chartTitle" style="margin:0;">Biểu đồ Thống kê Client</h2>
                    <div id="summaryInfo" style="font-size: 13px; color: var(--text-muted); margin-top:5px;"></div>
                </div>
                <div style="text-align: right; font-size: 11px; color: #94a3b8;">
                    Dữ liệu giả lập thực tế cao điểm: 08:00 | 10:00 | 14:00 | 16:00
                </div>
            </div>
            <div style="flex: 1; position: relative; min-height: 0;">
                <canvas id="clientChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        let dayConfigs = JSON.parse(localStorage.getItem('dayConfigs_v4')) || {};
        let editHistory = JSON.parse(localStorage.getItem('editHistory_v4')) || [];

        // Nhịp độ người dùng theo giờ (0h -> 23h)
        const hourlyCurve = [
            0.05, 0.04, 0.03, 0.03, 0.04, 0.08, 0.25, 0.55, 
            0.95, 0.88, 1.0, 0.85, 0.40, 0.65, 0.98, 0.82, 
            0.90, 0.70, 0.50, 0.35, 0.25, 0.18, 0.12, 0.08
        ];

        function initDayList() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            const globalMax = parseInt(document.getElementById('maxY').value);
            
            if (!startVal || !endVal) return;
            
            const start = new Date(startVal);
            const end = new Date(endVal);
            const container = document.getElementById('dayList');
            container.innerHTML = '';

            let current = new Date(start);
            while (current <= end) {
                const dateStr = current.toISOString().split('T')[0];
                const label = current.toLocaleDateString('vi-VN', { weekday: 'short', day: '2-digit', month: '2-digit' });
                
                if (!dayConfigs[dateStr]) {
                    const isWeekend = (current.getDay() === 0 || current.getDay() === 6);
                    dayConfigs[dateStr] = {
                        active: !isWeekend,
                        max: !isWeekend ? (globalMax - 100 - Math.floor(Math.random() * 400)) : 450
                    };
                }

                const div = document.createElement('div');
                div.className = `day-item ${!dayConfigs[dateStr].active ? 'is-low' : ''}`;
                div.innerHTML = `
                    <div class="day-label">${label}</div>
                    <div class="day-input-group">
                        <input type="number" value="${dayConfigs[dateStr].max}" 
                            onchange="updateDayMax('${dateStr}', this.value)">
                    </div>
                    <div style="text-align: right;">
                        <label class="toggle-switch">
                            <input type="checkbox" ${dayConfigs[dateStr].active ? 'checked' : ''} 
                                onchange="toggleDay('${dateStr}')">
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
                container.appendChild(div);
                current.setDate(current.getDate() + 1);
            }
            saveState();
        }

        function toggleDay(dateStr) {
            dayConfigs[dateStr].active = !dayConfigs[dateStr].active;
            const globalMax = parseInt(document.getElementById('maxY').value);
            dayConfigs[dateStr].max = dayConfigs[dateStr].active ? (globalMax - 250) : 450;
            addLog(`Đổi ngày ${dateStr} thành ${dayConfigs[dateStr].active ? 'CAO' : 'THẤP'}`);
            initDayList();
            updateChart();
        }

        function updateDayMax(dateStr, val) {
            dayConfigs[dateStr].max = parseInt(val) || 0;
            updateChart();
            saveState();
        }

        function addLog(action) {
            const time = new Date().toLocaleTimeString('vi-VN');
            editHistory.unshift({
                time, action,
                config: JSON.parse(JSON.stringify(dayConfigs)),
                maxY: document.getElementById('maxY').value,
                start: document.getElementById('startDate').value,
                end: document.getElementById('endDate').value
            });
            if (editHistory.length > 15) editHistory.pop();
            renderLogs();
            saveState();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            if (editHistory.length === 0) {
                list.innerHTML = '<div style="color:#999; text-align:center; padding-top:20px;">Trống</div>';
                return;
            }
            list.innerHTML = editHistory.map((log, i) => `
                <div class="log-item" onclick="restoreLog(${i})">
                    <div class="log-time">[${log.time}]</div>
                    <div>${log.action}</div>
                </div>
            `).join('');
        }

        function restoreLog(i) {
            const log = editHistory[i];
            dayConfigs = JSON.parse(JSON.stringify(log.config));
            document.getElementById('maxY').value = log.maxY;
            document.getElementById('startDate').value = log.start;
            document.getElementById('endDate').value = log.end;
            initDayList();
            updateChart();
        }

        function handleManualUpdate() {
            addLog("Cập nhật thông số toàn cục");
            updateChart();
        }

        function saveState() {
            localStorage.setItem('dayConfigs_v4', JSON.stringify(dayConfigs));
            localStorage.setItem('editHistory_v4', JSON.stringify(editHistory));
        }

        function exportImage() {
            const link = document.createElement('a');
            link.download = `bieu-do-client-${new Date().getTime()}.png`;
            link.href = document.getElementById('clientChart').toDataURL('image/png');
            link.click();
        }

        function updateChart() {
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            const yLimit = parseInt(document.getElementById('maxY').value);

            const labels = [];
            const datasets = [
                { label: 'Hust_B1', color: 'rgba(26, 35, 126, 0.7)' },
                { label: 'Hust_C7', color: 'rgba(33, 150, 243, 0.6)' },
                { label: 'Hust_D5', color: 'rgba(0, 188, 212, 0.5)' },
                { label: 'Hust_D8', color: 'rgba(76, 175, 80, 0.4)' },
                { label: 'Hust_TV.TQB', color: 'rgba(200, 230, 201, 0.3)' }
            ].map(ds => ({
                label: ds.label, data: [], backgroundColor: ds.color, 
                borderColor: ds.color.replace(/0\.\d/, '1'), fill: true, 
                tension: 0, pointRadius: 0, borderWidth: 0.5
            }));

            let totalDays = Math.ceil((end - start) / 86400000) + 1;
            for (let d = 0; d < totalDays; d++) {
                const date = new Date(start);
                date.setDate(start.getDate() + d);
                const dateStr = date.toISOString().split('T')[0];
                const config = dayConfigs[dateStr] || { max: yLimit };

                for (let h = 0; h < 24; h++) {
                    if (h === 0) labels.push(date.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'}));
                    else labels.push("");

                    let w = hourlyCurve[h];
                    datasets.forEach((ds, i) => {
                        const shares = [0.35, 0.25, 0.20, 0.12, 0.08];
                        const val = (config.max * shares[i] + (Math.random()*10-5)) * w;
                        ds.data.push(Math.max(2, Math.floor(val)));
                    });
                }
            }

            document.getElementById('summaryInfo').innerHTML = `Trục Y: 0 - <b>${yLimit}</b> | Dữ liệu <b>${totalDays} ngày</b>`;

            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('clientChart').getContext('2d'), {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 6, font:{size:10} } } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 } } },
                        y: { stacked: true, beginAtZero: true, max: yLimit, ticks: { stepSize: 500 } }
                    },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        }

        function clearLogs() {
            if(confirm("Xóa sạch lịch sử chỉnh sửa?")) {
                editHistory = [];
                renderLogs();
                saveState();
            }
        }

        window.onload = () => {
            renderLogs();
            initDayList();
            updateChart();
        };
    </script>
</body>
</html>
